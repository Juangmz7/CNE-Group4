name: Build and Deploy React Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-react-frontend.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-react-frontend.yaml'

env:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_FRONTEND_NAME }}
  BUILD_OUTPUT_DIR: 'build'
  FRONTEND_DIRECTORY: 'frontend/underflow'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      REACT_APP_API_BASE_URL: ${{ vars.REACT_APP_API_BASE_URL }}
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIRECTORY }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_DIRECTORY }}/package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Tests
        run: npm run test --if-present

      - name: Build Application
        run: npm run build

      - name: Upload Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app-artifact
          path: ${{ env.FRONTEND_DIRECTORY }}/${{ env.BUILD_OUTPUT_DIR }}

  deploy-to-azure:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    environment: production
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-app-artifact
          path: ${{ env.BUILD_OUTPUT_DIR }}

      - name: Deploy Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.BUILD_OUTPUT_DIR }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}